<svg viewBox="0 0 64 72" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Blackfang Labs Logo">
  <!-- Outer hex frame -->
  <polygon points="32,2 58,17 58,55 32,70 6,55 6,17"
    stroke="#00bcd4" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
  <!-- Inner hex frame -->
  <polygon points="32,8 52,20 52,52 32,64 12,52 12,20"
    stroke="#005f6e" stroke-width="0.7" fill="none" stroke-linejoin="round"/>

  <!-- Vertex nodes — outer hex -->
  <circle cx="32" cy="2"  r="1.8" fill="#00e5ff"/>
  <circle cx="58" cy="17" r="1.4" fill="#00bcd4"/>
  <circle cx="58" cy="55" r="1.4" fill="#00bcd4"/>
  <circle cx="32" cy="70" r="1.8" fill="#00e5ff"/>
  <circle cx="6"  cy="55" r="1.4" fill="#00bcd4"/>
  <circle cx="6"  cy="17" r="1.4" fill="#00bcd4"/>

  <!-- Short circuit traces from top and bottom vertices -->
  <line x1="32" y1="2"  x2="32" y2="8"  stroke="#00e5ff" stroke-width="0.8" stroke-dasharray="1.5,1.5"/>
  <line x1="32" y1="64" x2="32" y2="70" stroke="#00e5ff" stroke-width="0.8" stroke-dasharray="1.5,1.5"/>

  <!-- Crossbar / gum line -->
  <rect x="14" y="24" width="36" height="6" rx="1.5"
    fill="#001a22" stroke="#00bcd4" stroke-width="1"/>
  <!-- Gap between the two fangs in crossbar -->
  <rect x="29" y="24" width="6" height="6" fill="#000"/>
  <!-- Crossbar corner nodes -->
  <circle cx="14" cy="27" r="1.2" fill="#00bcd4"/>
  <circle cx="50" cy="27" r="1.2" fill="#00bcd4"/>

  <!-- Left fang body -->
  <path d="M15,30 L28,30 L24,55 L20,62 L16,55 Z"
    fill="#000d14" stroke="#00bcd4" stroke-width="1.1" stroke-linejoin="round"/>
  <!-- Left fang shine line -->
  <line x1="18" y1="33" x2="17" y2="50" stroke="#00e5ff" stroke-width="0.6" stroke-linecap="round" opacity="0.45"/>
  <!-- Left fang tip glow -->
  <circle cx="20" cy="62" r="1.3" fill="#00e5ff" opacity="0.7"/>

  <!-- Right fang body -->
  <path d="M36,30 L49,30 L48,55 L44,62 L40,55 Z"
    fill="#000d14" stroke="#00bcd4" stroke-width="1.1" stroke-linejoin="round"/>
  <!-- Right fang shine line -->
  <line x1="46" y1="33" x2="47" y2="50" stroke="#00e5ff" stroke-width="0.6" stroke-linecap="round" opacity="0.45"/>
  <!-- Right fang tip glow -->
  <circle cx="44" cy="62" r="1.3" fill="#00e5ff" opacity="0.7"/>

  <!-- Small drip at left fang tip -->
  <ellipse cx="20" cy="65" rx="1" ry="1.8" fill="#00e5ff" opacity="0.35"/>
  <!-- Small drip at right fang tip -->
  <ellipse cx="44" cy="65" rx="1" ry="1.8" fill="#00e5ff" opacity="0.35"/>

  <!-- Top arch tick marks -->
  <line x1="22" y1="8"  x2="20" y2="12" stroke="#003040" stroke-width="0.8"/>
  <line x1="42" y1="8"  x2="44" y2="12" stroke="#003040" stroke-width="0.8"/>
  <line x1="12" y1="20" x2="14" y2="23" stroke="#003040" stroke-width="0.8"/>
  <line x1="52" y1="20" x2="50" y2="23" stroke="#003040" stroke-width="0.8"/>
</svg>
